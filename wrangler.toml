name = "wedding-site"
compatibility_date = "2024-11-01"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "wedding-db"
database_id = "00000000-0000-0000-0000-000000000000"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "wedding-photos"

[vars]
# Override in Cloudflare Dashboard or .dev.vars for local dev
# ADMIN_PASSWORD and JWT_SECRET should be secrets, not vars
